<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>NATO Alfabet — UselessSite.nl</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:'Courier New',monospace; color:#4ade80; min-height:100vh; }
    body::before {
      content:''; position:fixed; inset:0; z-index:10; pointer-events:none;
      background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,#000 3px,#000 4px);
      opacity:.04;
    }

    .wrap { max-width:720px; margin:0 auto; padding:3rem 1.5rem 5rem; position:relative; z-index:20; }

    /* Header */
    header { border:1px solid #14532d; padding:1.25rem 1.5rem; margin-bottom:2rem; }
    .crumb { font-size:.55rem; color:#166534; letter-spacing:.15em; margin-bottom:.75rem; }
    .crumb a { color:#166534; text-decoration:none; }
    .crumb a:hover { color:#4ade80; }
    h1 { font-size:1.1rem; color:#4ade80; letter-spacing:.2em; margin-bottom:.25rem; }
    .sub { font-size:.6rem; color:#166534; letter-spacing:.12em; }

    /* Section labels */
    .section-label {
      font-size:.6rem; color:#166534; letter-spacing:.25em; margin-bottom:.75rem;
      display:flex; align-items:center; gap:.75rem;
    }
    .section-label::after { content:''; flex:1; border-top:1px solid #14532d40; }

    /* Reference table */
    .nato-grid {
      display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr));
      gap:.4rem; margin-bottom:2rem;
    }
    .nato-card {
      border:1px solid #14532d; padding:.6rem .75rem;
      display:flex; align-items:baseline; gap:.6rem;
    }
    .nato-letter { font-size:1rem; font-weight:bold; color:#4ade80; min-width:1.2rem; }
    .nato-word { font-size:.65rem; color:#166534; letter-spacing:.05em; }

    /* Converter */
    .converter { border:1px solid #14532d; padding:1.25rem; margin-bottom:2rem; }
    .input-row { display:flex; gap:.5rem; margin-bottom:.75rem; flex-wrap:wrap; }
    .input-row input {
      flex:1; min-width:200px; background:#000; border:1px solid #14532d;
      color:#4ade80; font-family:'Courier New',monospace; font-size:.75rem;
      padding:.5rem .75rem; outline:none; letter-spacing:.05em;
    }
    .input-row input:focus { border-color:#4ade80; }
    .input-row input::placeholder { color:#166534; }
    .btn {
      background:#000; border:1px solid #4ade80; color:#4ade80;
      font-family:'Courier New',monospace; font-size:.6rem; letter-spacing:.1em;
      padding:.5rem 1rem; cursor:pointer; white-space:nowrap; transition:background .15s;
    }
    .btn:hover { background:#4ade8015; }
    .btn-dim { border-color:#14532d; color:#166534; }
    .btn-dim:hover { border-color:#4ade8060; color:#4ade8090; background:#4ade800a; }
    #conv-output {
      font-size:.7rem; line-height:1.9; color:#4ade80; min-height:2rem;
      word-break:break-word;
    }
    .conv-word { display:inline-block; margin:0 .15rem .2rem; }
    .conv-char { color:#166534; font-size:.55rem; vertical-align:super; margin-right:.1rem; }
    .conv-space { display:inline-block; width:.75rem; border-top:1px solid #14532d30; margin:.1rem .1rem 0; vertical-align:middle; }

    /* Quiz */
    .quiz { border:1px solid #14532d; padding:1.25rem; margin-bottom:2rem; }
    .quiz-modes { display:flex; gap:.5rem; margin-bottom:1.25rem; flex-wrap:wrap; }
    .mode-btn {
      background:#000; border:1px solid #14532d; color:#166534;
      font-family:'Courier New',monospace; font-size:.55rem; letter-spacing:.1em;
      padding:.4rem .85rem; cursor:pointer; transition:all .15s;
    }
    .mode-btn.active { border-color:#4ade80; color:#4ade80; }
    .mode-btn:hover:not(.active) { border-color:#4ade8060; color:#4ade8090; }

    .quiz-body { display:flex; flex-direction:column; gap:1rem; }
    .quiz-prompt {
      text-align:center; padding:1.5rem;
      border:1px solid #14532d40;
    }
    .quiz-question { font-size:2.5rem; font-weight:bold; color:#4ade80; letter-spacing:.1em; margin-bottom:.35rem; }
    .quiz-hint { font-size:.55rem; color:#166534; letter-spacing:.1em; }

    #quiz-input {
      width:100%; background:#000; border:1px solid #14532d; color:#4ade80;
      font-family:'Courier New',monospace; font-size:.85rem; letter-spacing:.05em;
      padding:.65rem .75rem; outline:none; text-align:center; text-transform:uppercase;
    }
    #quiz-input:focus { border-color:#4ade80; }
    #quiz-input::placeholder { color:#166534; text-transform:none; }

    .quiz-feedback {
      text-align:center; font-size:.75rem; letter-spacing:.08em; min-height:1.2rem;
      padding:.35rem;
    }
    .feedback-ok { color:#4ade80; }
    .feedback-err { color:#dc2626; }

    .quiz-score {
      display:flex; justify-content:space-between; align-items:center;
      font-size:.55rem; color:#166534; letter-spacing:.1em; padding-top:.5rem;
      border-top:1px solid #14532d40;
    }
    .score-val { color:#4ade80; font-size:.7rem; }

    /* Multiple choice */
    .mc-options { display:grid; grid-template-columns:1fr 1fr; gap:.5rem; }
    .mc-btn {
      background:#000; border:1px solid #14532d; color:#166534;
      font-family:'Courier New',monospace; font-size:.7rem; letter-spacing:.05em;
      padding:.65rem; cursor:pointer; transition:all .15s; text-align:left;
    }
    .mc-btn:hover:not(:disabled) { border-color:#4ade8060; color:#4ade8090; background:#4ade800a; }
    .mc-btn.correct { border-color:#4ade80; color:#4ade80; background:#4ade8015; }
    .mc-btn.wrong { border-color:#dc2626; color:#dc2626; }
    .mc-btn:disabled { cursor:default; }

    footer {
      border-top:1px solid #14532d40; padding-top:1.5rem; margin-top:2rem;
      font-size:.6rem; color:#14532d; display:flex; justify-content:space-between; flex-wrap:wrap; gap:.5rem;
    }
    footer a { color:#14532d; text-decoration:none; }
    footer a:hover { color:#4ade80; }
  </style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="crumb"><a href="/">USELESSSITE.NL</a> / <a href="/tools/">TOOLS</a> / NATO ALFABET</div>
    <h1>══ NATO.EXE</h1>
    <div class="sub">LEER HET INTERNATIONAAL FONETISCH ALFABET — ALLES LOKAAL</div>
  </header>

  <!-- REFERENCE TABLE -->
  <div class="section-label">REFERENTIE</div>
  <div class="nato-grid" id="nato-grid"></div>

  <!-- CONVERTER -->
  <div class="section-label">TEKST → NATO</div>
  <div class="converter">
    <div class="input-row">
      <input id="conv-input" type="text" placeholder="Typ een woord of zin..." maxlength="80" autocomplete="off"/>
      <button class="btn btn-dim" id="conv-clear">WISSEN</button>
    </div>
    <div id="conv-output"></div>
  </div>

  <!-- QUIZ -->
  <div class="section-label">OEFENEN</div>
  <div class="quiz">
    <div class="quiz-modes">
      <button class="mode-btn active" data-mode="type-nato">LETTER → WOORD (TYPE)</button>
      <button class="mode-btn" data-mode="mc-nato">LETTER → WOORD (KEUZE)</button>
      <button class="mode-btn" data-mode="mc-letter">WOORD → LETTER (KEUZE)</button>
    </div>
    <div class="quiz-body">
      <div class="quiz-prompt">
        <div class="quiz-question" id="quiz-question">?</div>
        <div class="quiz-hint" id="quiz-hint">DRUK ENTER OM TE BEGINNEN</div>
      </div>
      <div id="quiz-type-area">
        <input id="quiz-input" type="text" placeholder="Typ het NATO-woord..." autocomplete="off" spellcheck="false"/>
      </div>
      <div id="quiz-mc-area" style="display:none">
        <div class="mc-options" id="mc-options"></div>
      </div>
      <div class="quiz-feedback" id="quiz-feedback"></div>
      <div class="quiz-score">
        <span>SCORE</span>
        <span><span class="score-val" id="score-correct">0</span> / <span id="score-total">0</span></span>
        <button class="btn btn-dim" id="quiz-reset" style="padding:.3rem .6rem;font-size:.5rem">RESET</button>
      </div>
    </div>
  </div>

  <footer>
    <span>© <script>document.write(new Date().getFullYear())</script> REIN — USELESSSITE.NL</span>
    <a href="/tools/">← TERUG NAAR TOOLS</a>
  </footer>

</div>
<script>
(function(){
  var NATO = [
    ['A','Alpha'],['B','Bravo'],['C','Charlie'],['D','Delta'],['E','Echo'],
    ['F','Foxtrot'],['G','Golf'],['H','Hotel'],['I','India'],['J','Juliet'],
    ['K','Kilo'],['L','Lima'],['M','Mike'],['N','November'],['O','Oscar'],
    ['P','Papa'],['Q','Quebec'],['R','Romeo'],['S','Sierra'],['T','Tango'],
    ['U','Uniform'],['V','Victor'],['W','Whiskey'],['X','X-ray'],['Y','Yankee'],['Z','Zulu']
  ];
  var MAP = {};
  NATO.forEach(function(p){ MAP[p[0]] = p[1]; });

  /* ── REFERENCE TABLE ── */
  var grid = document.getElementById('nato-grid');
  NATO.forEach(function(p){
    var card = document.createElement('div');
    card.className = 'nato-card';
    card.innerHTML = '<span class="nato-letter">'+p[0]+'</span><span class="nato-word">'+p[1].toUpperCase()+'</span>';
    grid.appendChild(card);
  });

  /* ── CONVERTER ── */
  var convInput = document.getElementById('conv-input');
  var convOutput = document.getElementById('conv-output');
  function updateConverter(){
    var text = convInput.value.toUpperCase();
    if(!text){ convOutput.innerHTML = ''; return; }
    var html = '';
    for(var i=0;i<text.length;i++){
      var c = text[i];
      if(c === ' '){ html += '<span class="conv-space"></span>'; }
      else if(MAP[c]){
        html += '<span class="conv-word"><span class="conv-char">'+c+'</span>'+MAP[c].toUpperCase()+'</span>';
      } else {
        html += '<span class="conv-word" style="color:#166534;">'+c+'</span>';
      }
    }
    convOutput.innerHTML = html;
  }
  convInput.addEventListener('input', updateConverter);
  document.getElementById('conv-clear').addEventListener('click', function(){
    convInput.value = ''; convOutput.innerHTML = ''; convInput.focus();
  });

  /* ── QUIZ ── */
  var mode = 'type-nato';
  var scoreCorrect = 0, scoreTotal = 0;
  var currentAnswer = '';
  var answered = false;

  document.querySelectorAll('.mode-btn').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.mode-btn').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      mode = btn.getAttribute('data-mode');
      resetScore();
      nextQuestion();
    });
  });

  document.getElementById('quiz-reset').addEventListener('click', function(){
    resetScore(); nextQuestion();
  });

  function resetScore(){
    scoreCorrect = 0; scoreTotal = 0;
    document.getElementById('score-correct').textContent = '0';
    document.getElementById('score-total').textContent = '0';
    document.getElementById('quiz-feedback').textContent = '';
    document.getElementById('quiz-feedback').className = 'quiz-feedback';
  }

  function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function shuffle(arr){
    var a = arr.slice();
    for(var i=a.length-1;i>0;i--){
      var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t;
    }
    return a;
  }

  function nextQuestion(){
    answered = false;
    var pair = rand(NATO);
    document.getElementById('quiz-feedback').textContent = '';
    document.getElementById('quiz-feedback').className = 'quiz-feedback';

    var typeArea = document.getElementById('quiz-type-area');
    var mcArea = document.getElementById('quiz-mc-area');

    if(mode === 'type-nato'){
      typeArea.style.display = 'block'; mcArea.style.display = 'none';
      document.getElementById('quiz-question').textContent = pair[0];
      document.getElementById('quiz-hint').textContent = 'TYPE HET NATO-WOORD';
      currentAnswer = pair[1].toLowerCase();
      var inp = document.getElementById('quiz-input');
      inp.value = ''; inp.disabled = false; inp.focus();
    } else if(mode === 'mc-nato'){
      typeArea.style.display = 'none'; mcArea.style.display = 'block';
      document.getElementById('quiz-question').textContent = pair[0];
      document.getElementById('quiz-hint').textContent = 'KIES HET JUISTE NATO-WOORD';
      currentAnswer = pair[1];
      buildMC(pair, false);
    } else { // mc-letter
      typeArea.style.display = 'none'; mcArea.style.display = 'block';
      document.getElementById('quiz-question').textContent = pair[1].toUpperCase();
      document.getElementById('quiz-hint').textContent = 'KIES DE JUISTE LETTER';
      currentAnswer = pair[0];
      buildMC(pair, true);
    }
  }

  function buildMC(pair, letterMode){
    var options = [pair];
    var pool = NATO.filter(function(p){ return p[0] !== pair[0]; });
    shuffle(pool).slice(0,3).forEach(function(p){ options.push(p); });
    options = shuffle(options);
    var container = document.getElementById('mc-options');
    container.innerHTML = '';
    options.forEach(function(opt){
      var btn = document.createElement('button');
      btn.className = 'mc-btn';
      btn.textContent = letterMode ? opt[0] : opt[1].toUpperCase();
      var isCorrect = opt[0] === pair[0];
      btn.addEventListener('click', function(){
        if(answered) return;
        answered = true;
        scoreTotal++;
        container.querySelectorAll('.mc-btn').forEach(function(b){
          b.disabled = true;
          if((letterMode ? b.textContent === pair[0] : b.textContent === pair[1].toUpperCase())){
            b.classList.add('correct');
          }
        });
        if(isCorrect){
          scoreCorrect++;
          showFeedback('CORRECT — '+pair[0]+' = '+pair[1].toUpperCase(), true);
        } else {
          btn.classList.add('wrong');
          showFeedback('FOUT — '+pair[0]+' = '+pair[1].toUpperCase(), false);
        }
        updateScoreDisplay();
        setTimeout(nextQuestion, 1200);
      });
      container.appendChild(btn);
    });
  }

  var quizInput = document.getElementById('quiz-input');
  quizInput.addEventListener('keydown', function(e){
    if(e.key !== 'Enter') return;
    if(answered){ nextQuestion(); return; }
    var val = quizInput.value.trim().toLowerCase();
    if(!val) return;
    answered = true;
    scoreTotal++;
    quizInput.disabled = true;
    if(val === currentAnswer){
      scoreCorrect++;
      showFeedback('CORRECT — '+currentAnswer.toUpperCase(), true);
    } else {
      showFeedback('FOUT — JUIST ANTWOORD: '+currentAnswer.toUpperCase(), false);
    }
    updateScoreDisplay();
    setTimeout(nextQuestion, 1000);
  });

  function showFeedback(msg, ok){
    var el = document.getElementById('quiz-feedback');
    el.textContent = msg;
    el.className = 'quiz-feedback ' + (ok ? 'feedback-ok' : 'feedback-err');
  }

  function updateScoreDisplay(){
    document.getElementById('score-correct').textContent = scoreCorrect;
    document.getElementById('score-total').textContent = scoreTotal;
  }

  nextQuestion();
})();
</script>
</body>
</html>
