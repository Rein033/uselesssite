<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
  <title>PADI eCard — Rein Eijkelboom</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a56d6;
      --navy:   #0d1f4c;
      --gray:   #8b95a8;
      --gray-lt:#f0f2f5;
      --border: #e2e6ed;
      --white:  #ffffff;
      --text:   #1a1f2e;
    }

    html, body {
      height: 100%;
      background: linear-gradient(160deg, #1848c8 0%, #1a56d6 50%, #1265e0 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem .75rem;
      min-height: 100vh;
    }

    /* ── PHONE SHELL ── */
    .phone {
      width: 100%;
      max-width: 390px;
      background: var(--white);
      border-radius: 44px;
      overflow: hidden;
      box-shadow:
        0 0 0 10px #0d2a7a,
        0 0 0 12px #1535a0,
        0 30px 80px rgba(0,0,0,.5);
      display: flex;
      flex-direction: column;
      max-height: 90vh;
      position: relative;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      background: var(--white);
      padding: .7rem 1.4rem .2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .75rem;
      font-weight: 600;
      color: var(--text);
      flex-shrink: 0;
    }
    .status-right { display: flex; gap: .4rem; align-items: center; }
    .sig { display: flex; gap: 2px; align-items: flex-end; }
    .sig i { width: 3px; background: var(--text); border-radius: 1px; display: block; }
    .sig i:nth-child(1){height:4px} .sig i:nth-child(2){height:7px}
    .sig i:nth-child(3){height:10px} .sig i:nth-child(4){height:13px}
    .bat { width: 22px; height: 11px; border: 1.5px solid var(--text); border-radius: 2.5px; position: relative; display: flex; align-items: center; padding: 1.5px 1.5px; }
    .bat::after { content:''; position:absolute; right:-4px; top:50%; transform:translateY(-50%); width:3px; height:5px; background:var(--text); border-radius:0 1px 1px 0; }
    .bat-fill { height:100%; width:30%; background:#e53535; border-radius:1px; }

    /* ── SCROLL AREA ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .scroll-area::-webkit-scrollbar { display: none; }

    /* ── APP HEADER (back + title) ── */
    .app-header {
      background: var(--white);
      padding: .55rem 1.1rem .55rem;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .back-btn {
      color: var(--blue);
      font-size: .9rem;
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: .1rem;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      padding: 0;
      text-decoration: none;
    }
    .back-chevron { font-size: 1.3rem; line-height: 1; margin-top: -1px; }
    .page-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: .95rem;
      font-weight: 700;
      color: var(--text);
    }

    /* ── SECTION LABEL ── */
    .section-label {
      background: var(--gray-lt);
      padding: .6rem 1.1rem;
      font-size: .65rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: .08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    /* ── HERO IMAGE ── */
    .hero-img {
      width: 100%;
      aspect-ratio: 4/3;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #87CEEB 0%, #87CEEB 45%, #20B2AA 45%, #008B8B 100%);
    }
    /* Sky */
    .hero-img::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 30% at 80% 25%, rgba(255,255,255,.6) 0%, transparent 60%),
        radial-gradient(ellipse 30% 15% at 20% 20%, rgba(255,255,255,.4) 0%, transparent 50%);
    }
    .hero-inner { position: relative; z-index: 1; width: 100%; height: 100%; }
    .padi-watermark {
      position: absolute;
      bottom: 10px;
      left: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1px;
    }
    .padi-wm-globe { width: 30px; height: 30px; }
    .padi-wm-word {
      font-size: .75rem;
      font-weight: 900;
      letter-spacing: .2em;
      color: white;
      font-style: italic;
      text-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    /* ── PERSON SECTION ── */
    .person-row {
      display: flex;
      align-items: flex-start;
      gap: .9rem;
      padding: .9rem 1.1rem .3rem;
      background: var(--white);
    }
    .person-photo {
      width: 90px;
      height: 90px;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: #e8edf5;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
    }
    .person-info { flex: 1; padding-top: .2rem; }
    .person-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: .55rem;
    }
    .person-field-lbl {
      font-size: .62rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: .1rem;
    }
    .person-field-val {
      font-size: .88rem;
      font-weight: 500;
      color: var(--text);
    }
    .edit-photo-btn {
      display: block;
      color: var(--blue);
      font-size: .82rem;
      font-weight: 500;
      padding: .3rem 1.1rem .7rem;
      background: none;
      border: none;
      cursor: pointer;
      font-family: inherit;
      text-align: left;
    }

    /* ── CERT DETAILS ── */
    .cert-section {
      background: var(--white);
      padding: .8rem 1.1rem 0;
      border-top: 1px solid var(--border);
    }
    .cert-field-lbl {
      font-size: .62rem;
      font-weight: 600;
      color: var(--gray);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: .15rem;
    }
    .cert-field-val {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .75rem;
    }
    .cert-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      padding-bottom: .5rem;
    }
    .cert-col .cert-field-val { font-size: .9rem; }

    /* ── BUTTONS ── */
    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .6rem;
      padding: .8rem 1.1rem 1rem;
      background: var(--white);
      border-top: 1px solid var(--border);
    }
    .btn-filled {
      background: var(--blue);
      color: #fff;
      font-size: .9rem;
      font-weight: 600;
      text-align: center;
      padding: .8rem .5rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-family: inherit;
    }
    .btn-stroke {
      background: transparent;
      color: var(--blue);
      font-size: .9rem;
      font-weight: 600;
      text-align: center;
      padding: .8rem .5rem;
      border-radius: 10px;
      border: 1.5px solid var(--blue);
      cursor: pointer;
      font-family: inherit;
    }

    /* ── BOTTOM NAV ── */
    .bottom-nav {
      background: var(--white);
      border-top: 1px solid var(--border);
      display: flex;
      padding: .4rem 0 calc(.55rem + env(safe-area-inset-bottom, 10px));
      flex-shrink: 0;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .15rem;
      padding: .3rem .2rem .1rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-tab svg { width: 25px; height: 25px; color: var(--gray); }
    .nav-tab.active svg { color: var(--blue); }
    .nav-lbl {
      font-size: .6rem;
      font-weight: 500;
      color: var(--gray);
    }
    .nav-tab.active .nav-lbl { color: var(--blue); font-weight: 700; }
  </style>
</head>
<body>

<div class="phone">

  <!-- STATUS BAR -->
  <div class="status-bar">
    <span>22:52</span>
    <div class="status-right">
      <div class="sig"><i></i><i></i><i></i><i></i></div>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 2.4C10.2 2.4 12.2 3.3 13.6 4.8L15 3.3C13.2 1.3 10.7 0 8 0C5.3 0 2.8 1.3 1 3.3L2.4 4.8C3.8 3.3 5.8 2.4 8 2.4Z" fill="currentColor"/>
        <path d="M8 5.2C9.5 5.2 10.8 5.8 11.8 6.8L13.2 5.3C11.8 3.9 9.9 3 8 3C6.1 3 4.2 3.9 2.8 5.3L4.2 6.8C5.2 5.8 6.5 5.2 8 5.2Z" fill="currentColor"/>
        <circle cx="8" cy="10" r="2" fill="currentColor"/>
      </svg>
      <div class="bat"><div class="bat-fill"></div></div>
    </div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area">

    <!-- APP HEADER -->
    <div class="app-header">
      <a class="back-btn" href="/portfolio/">
        <span class="back-chevron">‹</span>
      </a>
      <span class="page-title">Open Water</span>
    </div>

    <!-- SECTION LABEL -->
    <div class="section-label">Certification / Program Details</div>

    <!-- HERO IMAGE -->
    <div class="hero-img">
      <div class="hero-inner">
        <!-- Ocean scene SVG -->
        <svg width="100%" height="100%" viewBox="0 0 390 292" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
          <!-- Sky gradient -->
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#6CC6E8"/>
              <stop offset="100%" stop-color="#9DD8F0"/>
            </linearGradient>
            <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2CB5C0"/>
              <stop offset="100%" stop-color="#0E7A8C"/>
            </linearGradient>
            <linearGradient id="underwaterLight" x1=".5" y1="0" x2=".5" y2="1">
              <stop offset="0%" stop-color="rgba(100,220,230,.25)"/>
              <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
            </linearGradient>
          </defs>

          <!-- Sky -->
          <rect width="390" height="135" fill="url(#sky)"/>

          <!-- Clouds -->
          <ellipse cx="290" cy="45" rx="55" ry="22" fill="white" opacity=".85"/>
          <ellipse cx="320" cy="38" rx="38" ry="18" fill="white" opacity=".9"/>
          <ellipse cx="260" cy="50" rx="30" ry="14" fill="white" opacity=".75"/>
          <ellipse cx="70" cy="55" rx="48" ry="18" fill="white" opacity=".7"/>
          <ellipse cx="50" cy="48" rx="32" ry="15" fill="white" opacity=".8"/>

          <!-- Island far right -->
          <ellipse cx="350" cy="132" rx="45" ry="12" fill="#4AAD52" opacity=".9"/>
          <ellipse cx="355" cy="128" rx="32" ry="9" fill="#5DC164"/>

          <!-- Waterline -->
          <path d="M0 135 C65 130, 130 140, 195 135 C260 130, 325 140, 390 135 L390 292 L0 292Z" fill="url(#water)"/>

          <!-- Underwater light rays -->
          <path d="M150 135 L100 292" stroke="rgba(255,255,255,.06)" stroke-width="25"/>
          <path d="M230 135 L200 292" stroke="rgba(255,255,255,.06)" stroke-width="20"/>
          <path d="M310 135 L340 292" stroke="rgba(255,255,255,.07)" stroke-width="18"/>

          <!-- Sea turtle body -->
          <g transform="translate(165, 165) rotate(-12)">
            <!-- Shell -->
            <ellipse cx="0" cy="0" rx="52" ry="38" fill="#4A7A3A"/>
            <!-- Shell pattern -->
            <ellipse cx="0" cy="0" rx="38" ry="28" fill="#5A8F48" opacity=".7"/>
            <ellipse cx="0" cy="-8" rx="18" ry="14" fill="#3D6630" opacity=".6"/>
            <ellipse cx="-16" cy="8" rx="12" ry="9" fill="#3D6630" opacity=".5"/>
            <ellipse cx="16" cy="8" rx="12" ry="9" fill="#3D6630" opacity=".5"/>
            <!-- Head -->
            <ellipse cx="52" cy="-4" rx="18" ry="14" fill="#4A7A3A"/>
            <ellipse cx="57" cy="-8" rx="7" ry="5" fill="#5A8F48" opacity=".6"/>
            <!-- Eye -->
            <circle cx="64" cy="-7" r="3.5" fill="#1a1a1a"/>
            <circle cx="65" cy="-8" r="1.2" fill="white" opacity=".6"/>
            <!-- Front flippers -->
            <ellipse cx="30" cy="-45" rx="12" ry="32" fill="#4A7A3A" transform="rotate(30 30 -45)"/>
            <ellipse cx="-28" cy="-44" rx="10" ry="28" fill="#4A7A3A" transform="rotate(-25 -28 -44)"/>
            <!-- Back flippers -->
            <ellipse cx="-40" cy="30" rx="8" ry="20" fill="#4A7A3A" transform="rotate(20 -40 30)"/>
            <ellipse cx="22" cy="38" rx="7" ry="18" fill="#4A7A3A" transform="rotate(-15 22 38)"/>
            <!-- Bubbles -->
            <circle cx="75" cy="-18" r="4" fill="rgba(255,255,255,.5)" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
            <circle cx="82" cy="-30" r="2.5" fill="rgba(255,255,255,.4)" stroke="rgba(255,255,255,.25)" stroke-width=".8"/>
            <circle cx="70" cy="-38" r="3" fill="rgba(255,255,255,.45)" stroke="rgba(255,255,255,.3)" stroke-width=".8"/>
          </g>

          <!-- Water surface shimmer -->
          <path d="M0 135 C65 132, 130 138, 195 135 C260 132, 325 138, 390 135" stroke="rgba(255,255,255,.5)" stroke-width="1.5" fill="none"/>
          <path d="M0 140 C50 137, 100 143, 160 140 C220 137, 300 144, 390 140" stroke="rgba(255,255,255,.2)" stroke-width="1" fill="none"/>

          <!-- Underwater light overlay -->
          <rect x="0" y="135" width="390" height="157" fill="url(#underwaterLight)"/>
        </svg>

        <!-- PADI watermark bottom-left -->
        <div class="padi-watermark">
          <svg class="padi-wm-globe" viewBox="0 0 34 34" fill="none">
            <circle cx="17" cy="17" r="15" fill="#1a56d6"/>
            <circle cx="17" cy="17" r="15" fill="none" stroke="white" stroke-width="1"/>
            <ellipse cx="17" cy="17" rx="7" ry="15" fill="none" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
            <ellipse cx="17" cy="17" rx="15" ry="7" fill="none" stroke="rgba(255,255,255,.6)" stroke-width=".8"/>
            <path d="M9 12 C11 9, 15 9, 17 11 C18 12, 19 11, 20 12 C22 13.5, 21 16, 19 16 C17 16, 16 14, 14 15 C12 16, 9 15, 9 12Z" fill="white" opacity=".9"/>
            <path d="M19 15.5 C21 14, 25 14, 27 16 C28 17, 28 19, 26 20 C24 20, 22 19, 20 18Z" fill="white" opacity=".8"/>
          </svg>
          <span class="padi-wm-word">PADI</span>
        </div>
      </div>
    </div>

    <!-- PERSON INFO -->
    <div class="person-row">
      <div class="person-photo">
        <!-- Silhouette placeholder -->
        <svg width="90" height="90" viewBox="0 0 90 90" fill="none">
          <rect width="90" height="90" fill="#dde4f0"/>
          <circle cx="45" cy="33" r="16" fill="#b0bcd8"/>
          <path d="M10 85 C10 60, 80 60, 80 85" fill="#b0bcd8"/>
        </svg>
      </div>
      <div class="person-info">
        <div class="person-name">Rein Eijkelboom</div>
        <div class="person-field-lbl">Birthdate</div>
        <div class="person-field-val">••-••••-••••</div>
      </div>
    </div>
    <button class="edit-photo-btn">edit photo</button>

    <!-- CERT DETAILS -->
    <div class="cert-section">
      <div class="cert-field-lbl">Certification</div>
      <div class="cert-field-val">Open Water Diver</div>

      <div class="cert-two-col">
        <div class="cert-col">
          <div class="cert-field-lbl">Cert. Date</div>
          <div class="cert-field-val">15-Aug-2024</div>
        </div>
        <div class="cert-col">
          <div class="cert-field-lbl">PADI No.</div>
          <div class="cert-field-val">NL-OWD-3312</div>
        </div>
      </div>
    </div>

    <!-- BUTTONS -->
    <div class="btn-row">
      <button class="btn-filled">Share</button>
      <button class="btn-stroke">Buy Cert. Card</button>
    </div>

  </div><!-- /scroll-area -->

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">

    <div class="nav-tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V13h6v8"/>
      </svg>
      <span class="nav-lbl">Home</span>
    </div>

    <div class="nav-tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 3L2 8l10 5 10-5-10-5z" stroke-linejoin="round"/>
        <path d="M2 8v7M22 8v7M7 11v5l5 2.5L17 16v-5" stroke-linecap="round"/>
      </svg>
      <span class="nav-lbl">Learn</span>
    </div>

    <div class="nav-tab active">
      <!-- Dive / wave icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M3 12 C5 9, 7 9, 9 12 C11 15, 13 15, 15 12 C17 9, 19 9, 21 12" stroke-linecap="round"/>
        <path d="M3 17 C5 14, 7 14, 9 17 C11 20, 13 20, 15 17 C17 14, 19 14, 21 17" stroke-linecap="round" opacity=".5"/>
        <circle cx="12" cy="7" r="2" fill="currentColor" stroke="none"/>
        <path d="M12 9v3" stroke-linecap="round"/>
      </svg>
      <span class="nav-lbl">Dive</span>
    </div>

    <div class="nav-tab">
      <!-- Pro / shield-person icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 3L4 6v6c0 5 3.5 8.5 8 10 4.5-1.5 8-5 8-10V6L12 3z" stroke-linejoin="round"/>
        <circle cx="12" cy="10" r="2.5"/>
        <path d="M8 18c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke-linecap="round"/>
      </svg>
      <span class="nav-lbl">Pro</span>
    </div>

    <div class="nav-tab">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <circle cx="5" cy="12" r="1.8"/>
        <circle cx="12" cy="12" r="1.8"/>
        <circle cx="19" cy="12" r="1.8"/>
      </svg>
      <span class="nav-lbl">More</span>
    </div>

  </nav>

</div>

</body>
</html>
