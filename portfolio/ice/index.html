<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>IGLOO — Lunar Habitat</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #loading {
      position: fixed; inset: 0; background: #010510; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
    }
    #loading.fade { opacity: 0; pointer-events: none; }
    #loading h1 { font-size: 2rem; letter-spacing: 0.6em; color: #c8ddf0; font-weight: 300; margin-bottom: 1.5rem; }
    #load-track { width: 180px; height: 1px; background: #0a1a2e; }
    #load-fill { height: 100%; background: #4090d0; width: 0%; transition: width 0.25s; }
    #load-sub { margin-top: 1rem; font-size: 0.42rem; letter-spacing: 0.3em; color: #1e3858; }

    #ui { position: fixed; inset: 0; pointer-events: none; z-index: 10; }

    #title-wrap { position: absolute; top: 1.4rem; left: 1.6rem; }
    #title-wrap h1 { font-size: 1.2rem; letter-spacing: 0.55em; color: #d8eaf8; font-weight: 300; line-height: 1; }
    #title-wrap .sub { font-size: 0.38rem; letter-spacing: 0.3em; color: #2e4e68; margin-top: 0.3rem; }

    #back-link {
      position: absolute; top: 1.4rem; right: 1.6rem; pointer-events: all;
      color: #6aacc8; text-decoration: none; font-size: 0.5rem; letter-spacing: 0.22em;
      opacity: 0.6; transition: opacity 0.25s; -webkit-tap-highlight-color: transparent;
    }
    #back-link:hover { opacity: 1; }

    #panel-left {
      position: absolute; top: 4.8rem; left: 1.6rem;
      display: flex; flex-direction: column; gap: 0.38rem; pointer-events: all;
    }
    .mode-btn {
      background: rgba(0, 8, 20, 0.65); border: 1px solid rgba(70, 140, 210, 0.18);
      color: #2e4a64; font-family: 'Courier New', monospace; font-size: 0.42rem;
      letter-spacing: 0.18em; padding: 0.38rem 0.75rem; cursor: pointer;
      transition: all 0.2s; backdrop-filter: blur(4px); text-align: left;
      -webkit-tap-highlight-color: transparent;
    }
    .mode-btn:hover { color: #70b8d8; border-color: rgba(80,160,230,0.38); }
    .mode-btn.active { color: #a8d4f0; border-color: rgba(80,160,230,0.65); background: rgba(0,28,58,0.75); }

    #status-panel {
      position: absolute; right: 1.6rem; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 0.55rem; pointer-events: none;
    }
    .s-row { display: flex; align-items: center; gap: 0.5rem; justify-content: flex-end; }
    .s-lbl { font-size: 0.36rem; letter-spacing: 0.18em; color: #1a2e48; transition: color 0.9s; }
    .s-lbl.on { color: #3a6888; }
    .s-dot { width: 4px; height: 4px; border-radius: 50%; background: #080e1a; transition: background 0.9s, box-shadow 0.9s; }
    .s-dot.on { background: #28a0d0; box-shadow: 0 0 6px #28a0d0; }

    #progress-area {
      position: absolute; bottom: 5.5rem; left: 50%; transform: translateX(-50%);
      min-width: 250px; text-align: center; pointer-events: none;
    }
    #prog-lbl { font-size: 0.4rem; letter-spacing: 0.3em; color: #20384e; margin-bottom: 0.5rem; }
    #prog-track { height: 1px; background: rgba(70,130,200,0.12); position: relative; }
    #prog-fill { height: 100%; background: linear-gradient(90deg, #184070, #58b0f0); width: 0%; transition: width 0.3s; }
    #prog-pct { position: absolute; right: -2.8rem; top: -0.45rem; font-size: 0.4rem; letter-spacing: 0.1em; color: #385878; }

    #control-bar {
      position: absolute; bottom: 1.8rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.55rem; pointer-events: all;
    }
    .c-btn {
      background: rgba(0, 10, 24, 0.72); border: 1px solid rgba(70, 140, 210, 0.22);
      color: #507898; font-family: 'Courier New', monospace; font-size: 0.44rem;
      letter-spacing: 0.14em; padding: 0.46rem 0.88rem; cursor: pointer;
      transition: all 0.2s; backdrop-filter: blur(4px);
      -webkit-tap-highlight-color: transparent;
    }
    .c-btn:hover { color: #88c8e0; border-color: rgba(80,160,230,0.5); background: rgba(0,24,52,0.8); }
    .c-btn.active { color: #b0d8f0; border-color: rgba(100,180,255,0.65); }

    #tooltip {
      position: fixed; pointer-events: none; z-index: 20;
      background: rgba(0, 10, 22, 0.9); border: 1px solid rgba(70, 140, 210, 0.32);
      color: #88b8d8; font-size: 0.42rem; letter-spacing: 0.14em;
      padding: 0.32rem 0.62rem; display: none; backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
<div id="canvas-container" style="position:fixed;inset:0;z-index:0;"></div>

<div id="loading">
  <h1>IGLOO</h1>
  <div id="load-track"><div id="load-fill"></div></div>
  <div id="load-sub">LUNAR HABITAT SYSTEMS — INITIALIZING</div>
</div>

<div id="ui">
  <div id="title-wrap">
    <h1>IGLOO</h1>
    <div class="sub">LUNAR HABITAT PROTOTYPE · ASSEMBLY SEQUENCE</div>
  </div>
  <a href="/portfolio/" id="back-link">← PORTFOLIO</a>

  <div id="panel-left">
    <button class="mode-btn" id="btn-assemble" onclick="setMode('assembly')">ASSEMBLY MODE</button>
    <button class="mode-btn" id="btn-complete" onclick="setMode('completed')">COMPLETED VIEW</button>
    <button class="mode-btn" id="btn-explode"  onclick="setMode('exploded')">EXPLODED VIEW</button>
  </div>

  <div id="status-panel">
    <div class="s-row"><span class="s-lbl" id="lbl-power">POWER SYS</span><div class="s-dot" id="dot-power"></div></div>
    <div class="s-row"><span class="s-lbl" id="lbl-life">LIFE SUPPORT</span><div class="s-dot" id="dot-life"></div></div>
    <div class="s-row"><span class="s-lbl" id="lbl-hull">HULL INTEGRITY</span><div class="s-dot" id="dot-hull"></div></div>
    <div class="s-row"><span class="s-lbl" id="lbl-comms">COMMS LINK</span><div class="s-dot" id="dot-comms"></div></div>
  </div>

  <div id="progress-area">
    <div id="prog-lbl">BUILD SEQUENCE</div>
    <div id="prog-track">
      <div id="prog-fill"></div>
      <span id="prog-pct">0%</span>
    </div>
  </div>

  <div id="control-bar">
    <button class="c-btn active" id="btn-play"   onclick="togglePlay()">⏸ PAUSE</button>
    <button class="c-btn"        id="btn-reset"  onclick="resetBuild()">↺ RESET</button>
    <button class="c-btn active" id="btn-rot"    onclick="toggleAutoRot()">⟳ AUTO-ROTATE</button>
  </div>

  <div id="tooltip"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three":          "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE           from 'three';
import { EffectComposer }   from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass }       from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass }  from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass }       from 'three/addons/postprocessing/OutputPass.js';
import { OrbitControls }    from 'three/addons/controls/OrbitControls.js';

const PI = Math.PI, TAU = PI * 2;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
function easeOutBack(t) { t = clamp(t,0,1); const c = 2.70158; return 1 + c*Math.pow(t-1,3) + (c-1)*Math.pow(t-1,2); }
function easeOutCubic(t) { return 1 - Math.pow(1 - clamp(t,0,1), 3); }

// ── Loading ────────────────────────────────────────────────────────────────────
const $lFill   = document.getElementById('load-fill');
const $loading = document.getElementById('loading');
function setLoad(p) { $lFill.style.width = p + '%'; }
function doneLoading() {
  setLoad(100);
  setTimeout(() => { $loading.classList.add('fade'); setTimeout(() => $loading.remove(), 950); }, 350);
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const isMob = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const renderer = new THREE.WebGLRenderer({ antialias: !isMob, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, isMob ? 1.5 : 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = !isMob;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.88;
document.getElementById('canvas-container').appendChild(renderer.domElement);
setLoad(15);

// ── Scene & Camera ────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x010409);
scene.fog = new THREE.FogExp2(0x010409, 0.0095);

const camera = new THREE.PerspectiveCamera(55, innerWidth / innerHeight, 0.1, 600);
camera.position.set(14, 8, 16);
setLoad(20);

// ── Lights ────────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x0d1f3a, 1.8));

const sun = new THREE.DirectionalLight(0xfff5e0, 3.5);
sun.position.set(80, 100, 50);
sun.castShadow = !isMob;
if (!isMob) {
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 300;
  sun.shadow.camera.left = -25; sun.shadow.camera.right = 25;
  sun.shadow.camera.top  =  25; sun.shadow.camera.bottom = -25;
  sun.shadow.bias = -0.0003;
}
scene.add(sun);

const rimLight = new THREE.DirectionalLight(0x1a3060, 0.8);
rimLight.position.set(-50, 20, -80);
scene.add(rimLight);

const glowBlue = new THREE.PointLight(0x5090ff, 0, 18);
glowBlue.position.set(0, 3.5, 0);
scene.add(glowBlue);

const glowWarm = new THREE.PointLight(0xff9040, 0, 10);
glowWarm.position.set(0, 1.2, 3.5);
scene.add(glowWarm);
setLoad(28);

// ── Terrain ───────────────────────────────────────────────────────────────────
(function buildTerrain() {
  const geo = new THREE.PlaneGeometry(180, 130, 100, 72);
  const pa  = geo.attributes.position;
  function hn(x, z) {
    return Math.sin(x*0.09+1.2)*Math.cos(z*0.08+0.9)*1.6
         + Math.sin(x*0.24+2.0)*Math.cos(z*0.21+1.8)*0.65
         + Math.sin(x*0.55+0.6)*Math.cos(z*0.50+2.5)*0.28
         + Math.sin(x*1.30)    *Math.cos(z*1.20)    *0.10;
  }
  for (let i = 0; i < pa.count; i++) {
    const x = pa.getX(i), z = pa.getY(i);
    const flat = Math.max(0, 1 - Math.sqrt(x*x + z*z) / 11);
    pa.setZ(i, hn(x, z) * (1 - flat * 0.9));
  }
  pa.needsUpdate = true; geo.computeVertexNormals();

  const c = document.createElement('canvas'); c.width = c.height = 512;
  const cx = c.getContext('2d');
  cx.fillStyle = '#686868'; cx.fillRect(0, 0, 512, 512);
  for (let i = 0; i < 4000; i++) {
    const v = (60 + Math.random() * 80) | 0;
    cx.fillStyle = `rgb(${v},${v},${v})`;
    cx.beginPath(); cx.arc(Math.random()*512, Math.random()*512, 0.5 + Math.random()*3, 0, TAU); cx.fill();
  }
  for (let i = 0; i < 10000; i++) {
    const v = (55 + Math.random() * 85) | 0;
    cx.fillStyle = `rgba(${v},${v},${v},0.25)`;
    cx.fillRect(Math.random()*512, Math.random()*512, 1, 1);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(10, 7);

  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    map: tex, color: 0x8a8a8a, roughness: 0.96, metalness: 0.01,
  }));
  mesh.rotation.x = -PI / 2; mesh.receiveShadow = true;
  scene.add(mesh);

  [[-20,-18],[24,-22],[-12,28],[32,12],[-28,8],[18,-38],[-38,-10]].forEach(([x,z]) => {
    const r = 2.5 + Math.random() * 4;
    const cr = new THREE.Mesh(
      new THREE.RingGeometry(r * 0.65, r, 28),
      new THREE.MeshStandardMaterial({ color: 0x505050, roughness: 1, side: THREE.DoubleSide })
    );
    cr.rotation.x = -PI / 2; cr.position.set(x, 0.02, z); cr.receiveShadow = true;
    scene.add(cr);
  });
})();

// ── Stars ─────────────────────────────────────────────────────────────────────
(function buildStars() {
  const N = 2800, pos = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const th = Math.random()*TAU, ph = Math.acos(2*Math.random()-1), r = 260 + Math.random()*80;
    pos[i*3]   = r * Math.sin(ph) * Math.cos(th);
    pos[i*3+1] = r * Math.abs(Math.cos(ph)) + 30;
    pos[i*3+2] = r * Math.sin(ph) * Math.sin(th);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0xffffff, size: 0.5, transparent: true, opacity: 0.72,
    depthWrite: false, blending: THREE.AdditiveBlending,
  })));
})();
setLoad(48);

// ── Materials ─────────────────────────────────────────────────────────────────
const mShell = new THREE.MeshStandardMaterial({ color: 0xcfd4df, roughness: 0.38, metalness: 0.48 });
const mFrame = new THREE.MeshStandardMaterial({ color: 0x4a5462, roughness: 0.55, metalness: 0.72 });
const mDome  = new THREE.MeshPhysicalMaterial({ color: 0x7aaed0, roughness: 0.06, metalness: 0.05, transparent: true, opacity: 0.44, side: THREE.DoubleSide });
const mSolar = new THREE.MeshStandardMaterial({ color: 0x08141e, roughness: 0.15, metalness: 0.92, emissive: new THREE.Color(0x0a1828), emissiveIntensity: 0.3 });
const mWin   = new THREE.MeshBasicMaterial({ color: 0xffc860 });

// ── Habitat ───────────────────────────────────────────────────────────────────
const habGroup = new THREE.Group();
scene.add(habGroup);

const pieces      = [];
const statusMeshes = [];

const R  = 3.2;   // cylinder radius
const WH = 2.0;   // wall height
const DR = 3.35;  // dome sphere radius

function reg(mesh, fp, delay, name, flyFrom) {
  mesh.position.copy(fp).add(flyFrom);
  mesh.castShadow    = !isMob;
  mesh.receiveShadow = !isMob;
  mesh.userData.sectionName = name;
  habGroup.add(mesh);
  pieces.push({ mesh, finalPos: fp.clone(), startPos: mesh.position.clone(), delay, name });
}

// 1 · Foundation
reg(
  new THREE.Mesh(new THREE.CylinderGeometry(R+0.5, R+0.7, 0.22, 32), mFrame.clone()),
  new THREE.Vector3(0, 0.11, 0), 0, 'FOUNDATION PLATE', new THREE.Vector3(0, -10, 0)
);

// 2 · Base ring
{ const m = new THREE.Mesh(new THREE.TorusGeometry(R+0.06, 0.14, 8, 32), mFrame.clone());
  m.rotation.x = PI/2;
  reg(m, new THREE.Vector3(0, 0.26, 0), 0.35, 'BASE COUPLING RING', new THREE.Vector3(0,-8,0)); }

// 3–8 · Wall segments
const wallNames = ['WALL PANEL ALPHA','WALL PANEL BETA','WALL PANEL GAMMA','WALL PANEL DELTA','WALL PANEL EPSILON','WALL PANEL ZETA'];
for (let i = 0; i < 6; i++) {
  const phi0 = (i/6)*TAU, phiLen = TAU/6, midPhi = phi0 + phiLen/2;
  const mesh = new THREE.Mesh(
    new THREE.CylinderGeometry(R, R, WH, 6, 2, true, phi0, phiLen),
    mShell.clone()
  );
  if (i % 2 === 0) {
    const wm = new THREE.Mesh(new THREE.CircleGeometry(0.33, 16), mWin.clone());
    const wx = Math.sin(midPhi) * (R + 0.009), wz = Math.cos(midPhi) * (R + 0.009);
    wm.position.set(wx, 0.1, wz);
    wm.lookAt(wx * 100, 0.1, wz * 100);
    mesh.add(wm);
  }
  const ox = Math.sin(midPhi), oz = Math.cos(midPhi);
  reg(mesh, new THREE.Vector3(0, WH/2+0.26, 0), 0.55+i*0.14, wallNames[i],
    new THREE.Vector3(ox*9, -2+i*0.18, oz*9));
}

// 9 · Mid ring
{ const m = new THREE.Mesh(new THREE.TorusGeometry(R+0.06, 0.10, 8, 32), mFrame.clone());
  m.rotation.x = PI/2;
  reg(m, new THREE.Vector3(0, WH+0.26, 0), 1.55, 'MID COUPLING RING', new THREE.Vector3(0,9,0)); }

// 10–15 · Dome segments
for (let i = 0; i < 6; i++) {
  const phi0 = (i/6)*TAU, phiLen = TAU/6, midPhi = phi0 + phiLen/2;
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(DR, 10, 8, phi0, phiLen, 0, PI*0.50),
    mDome.clone()
  );
  const ox = Math.sin(midPhi)*6, oz = Math.cos(midPhi)*6;
  reg(mesh, new THREE.Vector3(0, WH+0.26, 0), 1.75+i*0.12, `DOME SEGMENT ${i+1}`,
    new THREE.Vector3(ox, 8+i*0.28, oz));
}

// 16 · Dome cap
reg(
  new THREE.Mesh(new THREE.SphereGeometry(0.65, 14, 12, 0, TAU, 0, PI*0.5), mShell.clone()),
  new THREE.Vector3(0, WH+0.26+DR*0.46, 0), 2.65, 'APEX CAP', new THREE.Vector3(0,16,0)
);

// 17 · Dome base ring
{ const m = new THREE.Mesh(new THREE.TorusGeometry(DR-0.04, 0.09, 8, 32), mFrame.clone());
  m.rotation.x = PI/2;
  reg(m, new THREE.Vector3(0, WH+0.32, 0), 2.8, 'DOME BASE RING', new THREE.Vector3(0,11,0)); }

// 18 · Airlock tube
{ const m = new THREE.Mesh(new THREE.CylinderGeometry(0.88, 0.88, 2.4, 16), mShell.clone());
  m.rotation.x = PI/2;
  reg(m, new THREE.Vector3(0, 0.95, R+1.2), 3.05, 'AIRLOCK TUBE', new THREE.Vector3(0,-3,12)); }

// 19 · Airlock dome
{ const m = new THREE.Mesh(new THREE.SphereGeometry(0.90, 16, 12, 0, TAU, 0, PI/2), mDome.clone());
  reg(m, new THREE.Vector3(0, 0.95, R+2.4+0.9), 3.2, 'AIRLOCK DOME', new THREE.Vector3(0,-2,12)); }

// 20 · Airlock door ring
{ const m = new THREE.Mesh(new THREE.TorusGeometry(0.55, 0.07, 8, 20), mFrame.clone());
  m.rotation.x = PI/2;
  reg(m, new THREE.Vector3(0, 0.95, R+0.12), 3.1, 'AIRLOCK DOOR FRAME', new THREE.Vector3(0,-2,8)); }

// 21–28 · Solar masts, arms, panels
[-1, 1].forEach((side, idx) => {
  const angle = (side > 0 ? 0.8 : -0.8) + PI/2;
  const bx = Math.sin(angle)*(R+0.4), bz = Math.cos(angle)*(R+0.4);
  const d  = 3.4 + idx*0.2;
  const fx = side*16, off = new THREE.Vector3(fx, 5, 0);

  const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.075, 3.4, 8), mFrame.clone());
  reg(mast, new THREE.Vector3(bx, 1.7+0.11, bz), d, 'SOLAR MAST', off.clone());

  const arm = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.1, 8), mFrame.clone());
  arm.rotation.z = PI/2;
  reg(arm, new THREE.Vector3(bx+side*1.05, 3.4, bz), d+0.2, 'SOLAR ARM', off.clone());

  [0.5, 1.6].forEach((ox, pi) => {
    const pan = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.034, 1.36), mSolar.clone());
    reg(pan, new THREE.Vector3(bx+side*ox, 3.4, bz), d+0.4+pi*0.1, 'SOLAR PANEL', new THREE.Vector3(fx, 8, 0));
  });
});

// 29 · Antenna mast
reg(
  new THREE.Mesh(new THREE.CylinderGeometry(0.028, 0.048, 2.4, 8), mFrame.clone()),
  new THREE.Vector3(0.5, WH+0.26+DR*0.46+1.2, 0.5), 4.2, 'COMMS MAST', new THREE.Vector3(0,20,0)
);

// 30 · Antenna dish
{ const m = new THREE.Mesh(new THREE.CylinderGeometry(0.48, 0.04, 0.28, 16, 1, true), mFrame.clone());
  m.rotation.set(PI/4, 0, 0);
  reg(m, new THREE.Vector3(0.5, WH+0.26+DR*0.46+2.5, 0.5), 4.4, 'COMMS DISH', new THREE.Vector3(0,20,0)); }

// 31 · Blink light
{ const m = new THREE.Mesh(new THREE.SphereGeometry(0.07, 8, 8), new THREE.MeshBasicMaterial({ color: 0xff2010 }));
  m.userData.isBlinkLight = true;
  reg(m, new THREE.Vector3(0.5, WH+0.26+DR*0.46+2.62, 0.5), 4.5, 'STATUS BEACON', new THREE.Vector3(0,20,0)); }

// 32–35 · Ring status lights
for (let i = 0; i < 4; i++) {
  const angle = (i/4)*TAU + PI/4;
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.065, 8, 8), new THREE.MeshBasicMaterial({ color: 0x20ff80 }));
  reg(m, new THREE.Vector3(Math.sin(angle)*(R+0.1), WH-0.12, Math.cos(angle)*(R+0.1)),
    2.0+i*0.1, 'STATUS INDICATOR', new THREE.Vector3(0,-5,0));
  statusMeshes.push(m);
}
setLoad(65);

// ── Dust ──────────────────────────────────────────────────────────────────────
const DC = isMob ? 400 : 1200;
const dustPos = new Float32Array(DC * 3);
const dustVel = new Float32Array(DC * 3);
for (let i = 0; i < DC; i++) {
  const r = 5 + Math.random()*20, a = Math.random()*TAU;
  dustPos[i*3]   = Math.cos(a)*r;
  dustPos[i*3+1] = Math.random()*4;
  dustPos[i*3+2] = Math.sin(a)*r;
  dustVel[i*3]   = (Math.random()-0.5)*0.010;
  dustVel[i*3+1] = (Math.random()-0.5)*0.003;
  dustVel[i*3+2] = (Math.random()-0.5)*0.010;
}
const dustGeo = new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPos, 3));
scene.add(new THREE.Points(dustGeo, new THREE.PointsMaterial({
  color: 0xa0a8b0, size: 0.07, transparent: true, opacity: 0.35,
  depthWrite: false, blending: THREE.AdditiveBlending,
})));

// ── Post-processing ───────────────────────────────────────────────────────────
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.62, 0.40, 0.82);
composer.addPass(bloom);
composer.addPass(new OutputPass());
setLoad(80);

// ── Orbit Controls ────────────────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2.5, 0);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.minDistance      = 5;
controls.maxDistance      = 50;
controls.maxPolarAngle    = PI / 2.08;
controls.autoRotate       = true;
controls.autoRotateSpeed  = 0.55;
controls.update();

// ── Assembly state ────────────────────────────────────────────────────────────
let assemblyTime = 0;
const TOTAL_DUR  = 5.5;
let isPlaying    = true;
let mode         = 'assembly';

// ── UI functions (global) ────────────────────────────────────────────────────
window.togglePlay = function() {
  isPlaying = !isPlaying;
  const btn = document.getElementById('btn-play');
  btn.textContent = isPlaying ? '⏸ PAUSE' : '▶ PLAY';
  btn.classList.toggle('active', isPlaying);
};

window.resetBuild = function() {
  assemblyTime = 0;
  isPlaying = true;
  document.getElementById('btn-play').textContent = '⏸ PAUSE';
  document.getElementById('btn-play').classList.add('active');
  pieces.forEach(p => p.mesh.position.copy(p.startPos));
};

window.toggleAutoRot = function() {
  controls.autoRotate = !controls.autoRotate;
  const btn = document.getElementById('btn-rot');
  btn.classList.toggle('active', controls.autoRotate);
  btn.textContent = controls.autoRotate ? '⟳ AUTO-ROTATE' : '⟳ ROTATION OFF';
};

window.setMode = function(m) {
  mode = m;
  document.getElementById('btn-assemble').classList.toggle('active', m === 'assembly');
  document.getElementById('btn-complete').classList.toggle('active', m === 'completed');
  document.getElementById('btn-explode' ).classList.toggle('active', m === 'exploded');
  if (m === 'assembly') { resetBuild(); }
};
setMode('assembly');

// ── Hover interaction ─────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2(9999, 9999);
const tooltip   = document.getElementById('tooltip');
let hoveredMesh = null;

function getHabMeshes() {
  const out = [];
  habGroup.traverse(o => { if (o.isMesh) out.push(o); });
  return out;
}

document.addEventListener('mousemove', e => {
  mouse.x = (e.clientX / innerWidth)  *  2 - 1;
  mouse.y = (e.clientY / innerHeight) * -2 + 1;
  tooltip.style.left = e.clientX + 14 + 'px';
  tooltip.style.top  = e.clientY - 8  + 'px';
});

document.addEventListener('click', e => {
  if (e.target.closest('#panel-left') || e.target.closest('#control-bar')) return;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getHabMeshes(), false);
  if (hits.length) {
    const wp = new THREE.Vector3();
    hits[0].object.getWorldPosition(wp);
    controls.target.lerp(wp, 0.7);
  }
});

// ── Status UI ─────────────────────────────────────────────────────────────────
const STATUS_THRESHOLDS = { power: 0.55, life: 0.70, hull: 0.82, comms: 0.94 };
function updateStatusUI(progress) {
  for (const [key, thr] of Object.entries(STATUS_THRESHOLDS)) {
    const on = progress >= thr;
    document.getElementById('dot-' + key).classList.toggle('on', on);
    document.getElementById('lbl-' + key).classList.toggle('on', on);
  }
}

// ── Animate ───────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const _tmp   = new THREE.Vector3();

function animate() {
  requestAnimationFrame(animate);
  const dt      = Math.min(clock.getDelta(), 0.05);
  const elapsed = clock.getElapsedTime();

  if (isPlaying && mode === 'assembly') {
    assemblyTime = Math.min(assemblyTime + dt * 0.9, TOTAL_DUR + 1.5);
  }

  const totalProgress = Math.min(1, assemblyTime / (TOTAL_DUR + 0.8));

  // ── Piece positions ────────────────────────────────────────────────────────
  pieces.forEach(p => {
    const { mesh, finalPos, startPos, delay } = p;
    if (mode === 'completed') {
      mesh.position.lerp(finalPos, 0.10);
    } else if (mode === 'exploded') {
      _tmp.copy(finalPos);
      const dx = finalPos.x, dy = finalPos.y, dz = finalPos.z;
      const len = Math.sqrt(dx*dx + dz*dz) + 0.001;
      _tmp.x += (dx / len) * (3.5 + dy * 0.25);
      _tmp.y += dy * 0.15 + 0.5;
      _tmp.z += (dz / len) * (3.5 + dy * 0.25);
      mesh.position.lerp(_tmp, 0.04);
    } else {
      const t = clamp((assemblyTime - delay) / 1.2, 0, 1);
      mesh.position.lerpVectors(startPos, finalPos, easeOutBack(t));
    }
  });

  // ── Glow lights ────────────────────────────────────────────────────────────
  glowBlue.intensity = totalProgress * (2.2 + Math.sin(elapsed * 1.1) * 0.4);
  glowWarm.intensity = totalProgress * (1.1 + Math.sin(elapsed * 2.3 + 1) * 0.5);

  // ── Blink light ────────────────────────────────────────────────────────────
  const blinkOn = (elapsed % 1.4) < 0.12;
  pieces.forEach(p => {
    if (p.mesh.userData.isBlinkLight) {
      p.mesh.material.color.setHex(blinkOn ? 0xff2010 : 0x180000);
    }
  });

  // ── Status ring lights ─────────────────────────────────────────────────────
  statusMeshes.forEach((m, i) => {
    const pulse = 0.5 + 0.5 * Math.sin(elapsed * 3 + i * 1.6);
    m.material.color.setRGB(0, pulse * totalProgress, 0.25 * totalProgress);
  });

  // ── Progress bar ───────────────────────────────────────────────────────────
  const pct = Math.round(totalProgress * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent  = pct + '%';
  updateStatusUI(totalProgress);

  // ── Hover ─────────────────────────────────────────────────────────────────
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(getHabMeshes(), false);
  if (hits.length) {
    const hit = hits[0].object;
    if (hoveredMesh !== hit) {
      if (hoveredMesh && hoveredMesh.material && hoveredMesh.material.emissive) {
        hoveredMesh.material.emissiveIntensity = 0;
      }
      hoveredMesh = hit;
      if (hoveredMesh.material && hoveredMesh.material.emissive) {
        hoveredMesh.material.emissive.setHex(0x1a3858);
        hoveredMesh.material.emissiveIntensity = 0.4;
      }
    }
    tooltip.style.display = 'block';
    tooltip.textContent   = hit.userData.sectionName || 'HABITAT MODULE';
  } else {
    if (hoveredMesh && hoveredMesh.material && hoveredMesh.material.emissive) {
      hoveredMesh.material.emissiveIntensity = 0;
    }
    hoveredMesh = null;
    tooltip.style.display = 'none';
  }

  // ── Dust ──────────────────────────────────────────────────────────────────
  for (let i = 0; i < DC; i++) {
    dustPos[i*3]   += dustVel[i*3];
    dustPos[i*3+1] += dustVel[i*3+1];
    dustPos[i*3+2] += dustVel[i*3+2];
    if (dustPos[i*3+1] < 0 || dustPos[i*3+1] > 4.5) dustVel[i*3+1] *= -1;
    const rx = dustPos[i*3], rz = dustPos[i*3+2];
    if (Math.sqrt(rx*rx + rz*rz) > 24) {
      dustPos[i*3] *= 0.94; dustPos[i*3+2] *= 0.94;
    }
  }
  dustGeo.attributes.position.needsUpdate = true;

  controls.update();
  composer.render();
}

// ── Resize ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});

setLoad(95);
clock.start();
animate();
doneLoading();
</script>
</body>
