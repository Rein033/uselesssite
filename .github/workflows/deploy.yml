name: Deploy static demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Temporarily remove API routes (incompatible with static export)
        run: mv src/app/api src/app/_api_backup

      - name: Build static demo
        run: npm run build
        env:
          USE_DEMO_DATA: true
          NEXTAUTH_SECRET: demo-secret-not-used
          NEXTAUTH_URL: https://uselesssite.nl

      - name: Restore API routes
        if: always()
        run: mv src/app/_api_backup src/app/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
