name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Temporarily remove API routes (incompatible with static export)
        run: mv src/app/api src/app/_api_backup

      - name: Build static export
        run: npm run build
        env:
          USE_DEMO_DATA: true
          NEXTAUTH_SECRET: demo-secret-not-used
          NEXTAUTH_URL: https://uselesssite.nl

      - name: Restore API routes
        if: always()
        run: mv src/app/_api_backup src/app/api

      - name: Deploy to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true
