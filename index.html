<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>UselessSite.nl</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; font-family: 'Courier New', monospace; color: #4ade80; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #screen { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #fake { text-align: center; padding: 2rem; }
    #fake h1 { font-size: 1.8rem; color: #4ade80; margin-bottom: .5rem; }
    #fake p  { font-size: .85rem; color: #166534; margin-bottom: 1.5rem; }
    #fake .bar { width: 320px; height: 6px; background: #14532d; border-radius: 3px; overflow: hidden; margin: 0 auto 1rem; }
    #fake .bar-fill { height: 100%; width: 0%; background: #4ade80; border-radius: 3px; transition: width .05s linear; }
    #fake .pct { font-size: .75rem; color: #166534; }
    #enter-btn { display: none; margin: 1.5rem auto 0; font-family: inherit; font-size: .85rem; color: #4ade80; background: none; border: 1px solid #4ade80; padding: .6rem 2rem; cursor: pointer; letter-spacing: .15em; animation: pulse 1.2s infinite; }
    #enter-btn:hover { background: #052e16; }
    #player { display: none; position: fixed; inset: 0; z-index: 99; }
    #player iframe { width: 100%; height: 100%; border: none; }
    #player .overlay-text { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); font-size: 1.2rem; color: #4ade80; text-shadow: 0 0 10px #4ade80; animation: pulse 1.5s infinite; white-space: nowrap; }
    #version-label { position: absolute; top: 1rem; left: 50%; transform: translateX(-50%); font-size: .65rem; color: #166534; letter-spacing: .1em; white-space: nowrap; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    body::before { content:''; position:fixed; inset:0; pointer-events:none; background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,#000 3px,#000 4px); opacity:.05; z-index:100; }
  </style>
</head>
<body>
<div id="screen">
  <div id="fake">
    <h1>USELESSSITE.NL</h1>
    <p id="status">Systeem opstarten...</p>
    <div class="bar"><div class="bar-fill" id="bar"></div></div>
    <div class="pct" id="pct">0%</div>
    <button id="enter-btn" onclick="launchRick()">[ ENTER ]</button>
  </div>
  <div id="player">
    <div id="yt"></div>
    <div class="overlay-text">NEVER GONNA GIVE YOU UP 🎵</div>
    <div id="version-label"></div>
  </div>
</div>
<script src="https://www.youtube.com/iframe_api"></script>
<script>
  var VERSIONS = [
    { id: 'dQw4w9WgXcQ',  label: 'ORIGINEEL (1987)'            },
    { id: 'wpV-gGA4PSk',  label: 'MEME EDITIE'                 },
    { id: '1_Z5q152GSQ',  label: 'METAL COVER'                 },
    { id: 'ntqd8MFnvk0',  label: 'SLOWED + REVERB'             },
    { id: 'z4hsGK8A1qY',  label: '8-BIT VERSIE'                },
    { id: 'KyElxl_j4Wc',  label: 'MINECRAFT NOTE BLOCK'        },
    { id: '9pnhbPxSmxY',  label: 'LOFI HIP HOP REMIX'          },
    { id: '7mK4K90fTNw',  label: 'VAPORWAVE MIX'               },
    { id: 'o4CnpJw6vP0',  label: 'REGGAE VERSIE'               },
    { id: '8VFzHYtOARw',  label: 'BASS BOOST ESCALATIE'        },
  ];

  var pick = VERSIONS[Math.floor(Math.random() * VERSIONS.length)];
  var ytPlayer;

  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt', {
      width: '100%',
      height: '100%',
      videoId: pick.id,
      playerVars: { autoplay: 0, mute: 0, controls: 0, modestbranding: 1, rel: 0, iv_load_policy: 3 },
    });
  }

  function launchRick() {
    document.getElementById('fake').style.display = 'none';
    document.getElementById('player').style.display = 'block';
    document.getElementById('version-label').textContent = '[ ' + pick.label + ' ]';
    if (ytPlayer && ytPlayer.playVideo) {
      ytPlayer.unMute();
      ytPlayer.setVolume(100);
      ytPlayer.playVideo();
    }
  }

  var msgs = ['Systeem opstarten...','RAM controleren...','Drivers laden...','Netwerk initialiseren...','Gebruiker authenticeren...','Portfolio laden...','Bijna klaar...'];
  var bar  = document.getElementById('bar');
  var pct  = document.getElementById('pct');
  var stat = document.getElementById('status');
  var p = 0;
  var interval = setInterval(function() {
    p += Math.random() * 3 + 1;
    if (p > 100) p = 100;
    bar.style.width = p + '%';
    pct.textContent = Math.floor(p) + '%';
    stat.textContent = msgs[Math.min(Math.floor(p / 15), msgs.length - 1)];
    if (p >= 100) {
      clearInterval(interval);
      pct.textContent = '100%';
      stat.textContent = 'Gereed.';
      document.getElementById('enter-btn').style.display = 'block';
    }
  }, 80);
</script>
</body>
</html>
