<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>UselessSite.nl</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:'Courier New',monospace; color:#4ade80; min-height:100vh; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:500; pointer-events:none;
      background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,#000 3px,#000 4px); opacity:.04; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── LOADER ── */
    #loader { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; }
    #loader h1 { font-size:1.8rem; color:#4ade80; margin-bottom:.4rem; }
    #loader .sub { font-size:.7rem; color:#166534; margin-bottom:1.5rem; letter-spacing:.12em; }
    #status { font-size:.8rem; color:#166534; margin-bottom:.75rem; height:1.2em; }
    .bar { width:320px; max-width:88vw; height:6px; background:#14532d; border-radius:3px; overflow:hidden; margin-bottom:.5rem; }
    .bar-fill { height:100%; width:0%; background:#4ade80; border-radius:3px; }
    #pct { font-size:.7rem; color:#166534; }
    #enter-btn { display:none; margin-top:1.5rem; font-family:inherit; font-size:.9rem; color:#4ade80; background:none; border:1px solid #4ade80; padding:.65rem 2.2rem; cursor:pointer; letter-spacing:.2em; animation:blink 1s step-end infinite; }

    /* ── SHARED TOP BAR ── */
    .bar-top { display:flex; align-items:center; justify-content:space-between; padding:.5rem 1rem; font-size:.65rem; color:#166534; border-bottom:1px solid #14532d; flex-shrink:0; }
    .bar-top span { color:#4ade80; animation:blink 1s step-end infinite; }
    .bar-top a { color:#4ade8066; text-decoration:none; cursor:pointer; animation:none; font-size:.6rem; letter-spacing:.1em; }
    .bar-top a:hover { color:#4ade80; }

    /* ── RICKROLL ── */
    #player { display:none; position:fixed; inset:0; z-index:400; background:#000; flex-direction:column; }
    #player iframe { flex:1; width:100%; border:none; }

    /* ── MEME VIEW ── */
    #meme-view { display:none; position:fixed; inset:0; z-index:400; background:#000; flex-direction:column; }
    #meme-view .meme-content { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:1rem; }
    #meme-view img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <h1>USELESSSITE.NL</h1>
  <div class="sub">SYSTEM INITIALIZING...</div>
  <div id="status">Booting...</div>
  <div class="bar"><div class="bar-fill" id="bar"></div></div>
  <div id="pct">0%</div>
  <button id="enter-btn" onclick="reveal()">[ ENTER ]</button>
</div>

<!-- RICKROLL PLAYER -->
<div id="player">
  <div class="bar-top">
    <span>&#9679; NEVER GONNA GIVE YOU UP — RICK ASTLEY</span>
    <a onclick="location.reload()">[ NEW PAGE → ]</a>
  </div>
  <iframe id="yt-frame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
</div>

<!-- MEME VIEW -->
<div id="meme-view">
  <div class="bar-top">
    <span id="meme-label">MEME.EXE</span>
    <a onclick="location.reload()">[ NEW PAGE → ]</a>
  </div>
  <div class="meme-content">
    <img id="meme-img" src="" alt="meme" />
  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
  /* ── YouTube ── */
  var ytPlayer;
  function onYouTubeIframeAPIReady() {
    ytPlayer = new YT.Player('yt-frame', {
      videoId: 'dQw4w9WgXcQ',
      playerVars: { autoplay:0, mute:0, controls:1, modestbranding:1, rel:0, iv_load_policy:3 },
    });
  }

  /* ── Meme list: [label, template-id, line1, line2, ...] ── */
  var MEMES = [
    ["DRAKE.EXE",               "drake",          "Reading the documentation",              "Copying from Stack Overflow"],
    ["THIS IS FINE",            "fine",            "Production is on fire",                  "This is fine"],
    ["BAD LUCK BRIAN",          "blb",             "Deploys to production",                  "At 5pm on a Friday"],
    ["SUCCESS KID",             "success",         "It compiled",                            "On the first try"],
    ["GOOD GUY GREG",           "ggg",             "Writes clear commit messages",           "Every single time"],
    ["SCUMBAG STEVE",           "scumbag",         "Pushes directly to main",                "Doesn't tell anyone"],
    ["OVERLY ATTACHED GF",      "oag",             "You haven't committed in an hour",       "Are you okay?"],
    ["PHILOSORAPTOR",           "philosoraptor",   "If it works in dev but breaks in prod",  "Does it really work?"],
    ["MOST INTERESTING MAN",    "interesting",     "I don't always test my code",            "But when I do, it's in production"],
    ["ANCIENT ALIENS",          "aag",             "Requirements changed again?",            "Aliens"],
    ["FIRST WORLD PROBLEMS",    "fwp",             "My IDE theme",                           "Doesn't match my terminal"],
    ["SOCIALLY AWKWARD PENGUIN","sap",             "Asks a quick question in the meeting",   "45 minutes later still going"],
    ["GRUMPY CAT",              "grumpycat",       "Oh it works now?",                       "No"],
    ["CONDESCENDING WONKA",     "skinnywilly",     "You finished in an hour?",               "Tell me more about the tests you wrote"],
    ["ROLL SAFE",               "rollsafe",        "Can't have null pointer exceptions",     "If you never use null"],
    ["Y U NO",                  "yuno",            "Y U NO",                                 "Write documentation?"],
    ["FOREVER ALONE",           "fa",              "Me waiting",                             "For PR approval"],
    ["CHANGE MY MIND",          "cmm",             "It works on my machine",                 "Change my mind"],
    ["EXPANDING BRAIN",         "brain",           "Console.log",                            "Using the debugger",             "Print statements everywhere",    "Turn it off and on again"],
    ["DOGE",                    "doge",            "wow",                                    "such legacy code",               "very spaghetti",                 "much debug"],
    ["SURPRISED PIKACHU",       "pikachu",         "When the bug fixes itself",              "After restarting"],
    ["DISTRACTED BOYFRIEND",    "distracted",      "My current deadline",                    "Me",                             "New shiny framework"],
    ["KERMIT SIPPING TEA",      "kermit",          "Tests are failing in CI",                "But that's none of my business"],
    ["TWO BUTTONS",             "twobuttons",      "Fix it properly",                        "Turn it off and on again"],
    ["ONE DOES NOT SIMPLY",     "boromir",         "One does not simply",                    "Ship on a Friday"],
    ["BATMAN SLAPPING ROBIN",   "batman",          "Stop saying",                            "Almost done"],
    ["NPC",                     "npc",             "Have you tried",                         "Turning it off and on again?"],
    ["BERNIE SANDERS",          "bernie",          "I am once again asking",                 "You to write tests"],
    ["GRU'S PLAN",              "gru",             "Write clean code",                       "Write clean code",               "It ships tonight",               "Write spaghetti code"],
    ["COFFIN DANCE",            "cdance",          "My last stable build",                   "Being deployed to production"],
    ["CAPTAIN PICARD FACEPALM", "picard",          "When the intern",                        "Pushes directly to production"],
    ["POINTING SPIDERMAN",      "spiderman",       "Me looking at my old code",              "Also me"],
    ["IS THIS A BUTTERFLY",     "butterfly",       "Is this",                                "A bug or a feature?"],
    ["BLINKING WHITE GUY",      "blinking",        "When the CI passes",                     "On the first try"],
    ["CRYING JORDAN",           "jordan",          "When your PR",                           "Has 200 review comments"],
    ["MOCKING SPONGEBOB",       "spongemock",      "It WoRkS oN mY mAcHiNe",                ""],
    ["CONSPIRACY KEANU",        "keanu",           "What if the bug",                        "Is actually a feature?"],
    ["WOMAN YELLING AT CAT",    "woman-cat",       "The client",                             "The original design"],
    ["HIDE THE PAIN HAROLD",    "harold",          "When the client asks for one more feature",""],
    ["YO DAWG",                 "yodawg",          "Yo dawg I heard you like bugs",          "So I put a bug in your bugfix"],
    ["SKEPTICAL 3RD WORLD KID", "ski",             "Must be nice",                           "To have documentation"],
    ["OPRAH",                   "oprah",           "You get a hotfix",                       "Everyone gets a hotfix"],
    ["UNO REVERSE",             "uno",             "Client: Make it pop",                    "Me: sends invoice"],
    ["ALWAYS HAS BEEN",         "astronaut",       "Wait, was it always broken?",            "Always has been"],
    ["BABY YODA",               "baby-yoda",       "When the code works",                    "But you don't know why"],
    ["CONFUSED MATH LADY",      "math",            "Me trying to understand",                "The legacy codebase"],
    ["MORPHEUS",                "morpheus",        "What if I told you",                     "The bug was the requirements all along"],
    ["SHUT UP AND TAKE MY MONEY","futurama",       "Shut up and take my money",              ""],
    ["TROLLFACE",               "trollface",       "It's not a bug",                         "It's a feature. Problem?"],
    ["DISASTER GIRL",           "disastergirl",    "Me watching the build fail",             "That I didn't cause"],
  ];

  /* ── Pick experience on load ── */
  var isRick = Math.random() < (1 / 50);
  var memeData = null;

  if (!isRick) {
    memeData = MEMES[Math.floor(Math.random() * MEMES.length)];
    // Pre-load the image while the loader runs
    var preload = new Image();
    preload.src = buildUrl(memeData);
  }

  function encLine(s) {
    return s.replace(/_/g,'__').replace(/ /g,'_').replace(/\?/g,'~q').replace(/!/g,'~e').replace(/\//g,'~s').replace(/%/g,'~p').replace(/#/g,'~h');
  }

  function buildUrl(m) {
    var lines = m.slice(2).filter(function(l){ return l !== ''; }).map(encLine);
    return 'https://api.memegen.link/images/' + m[1] + '/' + (lines.length ? lines.join('/') : '_') + '.jpg?width=800';
  }

  /* ── Reveal on ENTER click ── */
  function reveal() {
    document.getElementById('loader').style.display = 'none';
    if (isRick) {
      var p = document.getElementById('player');
      p.style.display = 'flex';
      if (ytPlayer && ytPlayer.playVideo) {
        ytPlayer.unMute();
        ytPlayer.setVolume(100);
        ytPlayer.playVideo();
      }
    } else {
      var mv = document.getElementById('meme-view');
      mv.style.display = 'flex';
      document.getElementById('meme-label').textContent = memeData[0];
      document.getElementById('meme-img').src = buildUrl(memeData);
    }
  }

  /* ── Loader animation ── */
  var msgs = ['Booting...','Checking RAM...','Loading drivers...','Connecting to network...','Authenticating user...','Preparing experience...','Almost there...','Done.'];
  var barEl  = document.getElementById('bar');
  var pctEl  = document.getElementById('pct');
  var statEl = document.getElementById('status');
  var prog = 0;
  var iv = setInterval(function() {
    prog += Math.random() * 3 + 1;
    if (prog > 100) prog = 100;
    barEl.style.width = prog + '%';
    pctEl.textContent = Math.floor(prog) + '%';
    statEl.textContent = msgs[Math.min(Math.floor(prog / 14), msgs.length - 1)];
    if (prog >= 100) {
      clearInterval(iv);
      pctEl.textContent = '100%';
      statEl.textContent = 'Done.';
      document.getElementById('enter-btn').style.display = 'block';
    }
  }, 80);
</script>
</body>
</html>
