<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>UselessSite.nl</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; font-family:'Courier New',monospace; color:#4ade80; min-height:100vh; overflow:hidden; }
    body::before { content:''; position:fixed; inset:0; z-index:500; pointer-events:none;
      background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 3px,#000 3px,#000 4px); opacity:.04; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* ── LOADER ── */
    #loader { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#000; }
    #loader h1 { font-size:1.8rem; color:#4ade80; margin-bottom:.4rem; }
    #loader .sub { font-size:.7rem; color:#166534; margin-bottom:1.5rem; letter-spacing:.12em; }
    #status { font-size:.8rem; color:#166534; margin-bottom:.75rem; height:1.2em; }
    .bar { width:320px; max-width:88vw; height:6px; background:#14532d; border-radius:3px; overflow:hidden; margin-bottom:.5rem; }
    .bar-fill { height:100%; width:0%; background:#4ade80; border-radius:3px; }
    #pct { font-size:.7rem; color:#166534; }
    #enter-btn { display:none; margin-top:1.5rem; font-family:inherit; font-size:.9rem; color:#4ade80; background:none; border:1px solid #4ade80; padding:.65rem 2.2rem; cursor:pointer; letter-spacing:.2em; animation:blink 1s step-end infinite; }

    /* ── CODE INPUT ── */
    #code-section { position:absolute; bottom:2rem; display:flex; flex-direction:column; align-items:center; gap:.4rem; }
    #code-label { font-size:.55rem; color:#166534; letter-spacing:.2em; }
    #code-input { background:none; border:1px solid #14532d; color:#4ade80; font-family:'Courier New',monospace; font-size:.95rem; padding:.35rem .75rem; width:8rem; text-align:center; letter-spacing:.5em; outline:none; caret-color:#4ade80; }
    #code-input:focus { border-color:#4ade8066; }
    #code-input::placeholder { color:#14532d; letter-spacing:.3em; }
    #code-error { font-size:.55rem; color:#dc2626; letter-spacing:.12em; height:.8rem; }

    /* ── EGG OVERLAY ── */
    #egg-overlay { display:none; position:fixed; inset:0; z-index:300; background:#000000ee; align-items:center; justify-content:center; padding:1.5rem; }
    #egg-box { border:1px solid #4ade80; padding:1.5rem 2rem; max-width:540px; width:100%; background:#000; max-height:85vh; overflow-y:auto; }
    #egg-code { font-size:.5rem; color:#166534; letter-spacing:.2em; margin-bottom:.75rem; }
    #egg-pre { font-size:.7rem; color:#4ade80; line-height:1.7; white-space:pre; margin-bottom:1.25rem; }
    #egg-close { font-family:inherit; font-size:.75rem; color:#4ade80; background:none; border:1px solid #4ade80; padding:.45rem 1.5rem; cursor:pointer; letter-spacing:.2em; animation:blink 1s step-end infinite; display:block; margin:0 auto; }

    /* ── SHARED TOP BAR ── */
    .bar-top { display:flex; align-items:center; justify-content:space-between; padding:.5rem 1rem; font-size:.65rem; color:#166534; border-bottom:1px solid #14532d; flex-shrink:0; }
    .bar-top span { color:#4ade80; animation:blink 1s step-end infinite; }
    .bar-top a { color:#4ade8066; text-decoration:none; cursor:pointer; animation:none; font-size:.6rem; letter-spacing:.1em; }
    .bar-top a:hover { color:#4ade80; }

    /* ── RICKROLL ── */
    #player { display:none; position:fixed; inset:0; z-index:400; background:#000; flex-direction:column; }
    #player iframe { flex:1; width:100%; border:none; }

    /* ── MEME VIEW ── */
    #meme-view { display:none; position:fixed; inset:0; z-index:400; background:#000; flex-direction:column; }
    #meme-view .meme-content { flex:1; display:flex; align-items:center; justify-content:center; overflow:hidden; padding:1rem; }
    #meme-view img { max-width:100%; max-height:100%; object-fit:contain; display:block; }
  </style>
</head>

  <div id="code-section">

    <input id="code-input" type="text" maxlength="4" placeholder="0000" autocomplete="off" spellcheck="false" inputmode="numeric" />
    <div id="code-error"></div>

    pctEl.textContent = Math.floor(prog) + '%';
    statEl.textContent = msgs[Math.min(Math.floor(prog / 14), msgs.length - 1)];
    if (prog >= 100) {
      clearInterval(iv);
      pctEl.textContent = '100%';
      statEl.textContent = 'Done.';
      document.getElementById('enter-btn').style.display = 'block';
    }
  }, 80);
</script>
</body>
</html>
