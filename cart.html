<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winkelwagen — GunPatch.nl</title>
<link rel="icon" href="/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shop.css">
</head>
<body>

<header>
  <a class="logo" href="/">GUN<span>PATCH</span>.NL</a>
  <nav class="nav-links">
    <a href="/">PATCHES</a>
    <a href="/custom.html">CUSTOM ORDER</a>
  </nav>
  <a href="/cart.html" class="cart-btn active">
    🛒 CART
    <span id="cart-badge">0</span>
  </a>
</header>

<div class="cart-page">
  <h1>🛒 YOUR CART</h1>

  <div id="cart-items"></div>

  <div class="cart-summary">
    <div class="total-row">
      <span class="total-label">TOTAL</span>
      <span class="total-amount" id="cart-total">€0.00</span>
    </div>

    <div id="checkout-form" class="checkout-form">
      <h2>SHIPPING INFO</h2>

      <div class="form-group">
        <label>FULL NAME *</label>
        <input type="text" id="order-name" placeholder="Your name">
      </div>
      <div class="form-group">
        <label>EMAIL *</label>
        <input type="email" id="order-email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>SHIPPING ADDRESS *</label>
        <textarea id="order-address" placeholder="Street, city, country, zip"></textarea>
      </div>
      <div class="form-group">
        <label>NOTES (optional)</label>
        <textarea id="order-notes" placeholder="Special requests, color preferences..."></textarea>
      </div>

      <button class="place-order-btn" onclick="submitOrder()">📦 PLACE ORDER</button>
      <p style="font-family:Arial;font-size:11px;color:#666;margin-top:12px;text-align:center;">We'll send you a payment link via email after confirming your order.</p>
    </div>

    <div id="order-success">
      <h2>✅ ORDER SENT!</h2>
      <p>Thanks! We'll email you a confirmation and payment link within 24 hours.</p>
      <br>
      <a href="/" style="color:var(--magenta);font-size:10px;font-family:'Press Start 2P',cursive;">← KEEP SHOPPING</a>
    </div>
  </div>
</div>

<footer>
  <a href="/">← Back to Shop</a> |
  <a href="/privacy.html">Privacy</a>
</footer>

<script src="/js/shop.js"></script>
<script>initCart();</script>
</body>
</html>
